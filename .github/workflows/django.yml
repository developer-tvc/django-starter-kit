name: Django CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

jobs:
  # ── 1. Lint & Format ────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 black isort

      - name: black (format check)
        run: black --check .

      - name: isort (import order check)
        run: isort --check-only --diff .

      - name: flake8 (style & error check)
        run: flake8 . --max-line-length=88 --extend-ignore=E203,W503

  # ── 2. Security Checks ──────────────────────────────────────────────────────
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit "safety<3"

      - name: bandit (static security analysis)
        run: bandit -r . -x ./tests,./venv --severity-level medium

      - name: safety (dependency vulnerability check)
        run: safety check -r requirements.txt --full-report
        # To ignore specific CVEs: safety check --ignore=12345

  # ── 3. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint]  # Don't run tests if linting fails

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]  # Extend to ["3.11", "3.12"] for multi-version

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DJANGO_SETTINGS_MODULE: config.settings.test  # adjust to your settings path
          SECRET_KEY: ci-secret-key-not-for-production
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-secret-key-not-for-production
        run: |
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          # token: ${{ secrets.CODECOV_TOKEN }}  # Uncomment for private repos

  # ── 4. Django system checks ──────────────────────────────────────────────────
  django-checks:
    name: Django System Checks
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Django check (system checks framework)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-secret-key-not-for-production
        run: python manage.py check --deploy --fail-level WARNING

      - name: Check for missing migrations
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-secret-key-not-for-production
        run: python manage.py makemigrations --check --dry-run
