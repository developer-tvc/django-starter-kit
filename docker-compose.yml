services:
  django_skeleton:
    container_name: django_skeleton
    build: .
    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    restart: always

    networks:
      - app_network

  celery_worker:
    container_name: celery_worker
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - django_skeleton
    restart: always
    networks:
      - app_network

  redis:
    container_name: redis
    image: redis:7
    restart: always
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
