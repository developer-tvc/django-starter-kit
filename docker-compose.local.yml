version: "3.9"

services:
  django_skeleton:
    container_name: django_skeleton

    ports:
      - "8000:8000"

    env_file:
      - .env

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - .:/app

    restart: always

    networks:
      - app_network

networks:
  app_network:
    driver: bridge
